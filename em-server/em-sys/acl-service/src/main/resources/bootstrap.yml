server:
  port: 5007
  servlet:
    context-path: /acl
spring:
  application:
    name: @project.artifactId@
  profiles:
    active: @profiles.active@
  cloud:
    nacos:
      server-addr: @nacos.url@
      username: nacos
      password: @nacos.pw@
      discovery:
        namespace: @profiles.active@
        group: @app.group@
      config:
        namespace: @profiles.active@
        group: @app.group@
        file-extension: yml
        extension-configs[0]:
          data-id: service-base.yml
          group: @app.group@
